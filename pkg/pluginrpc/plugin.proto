syntax = "proto3";

package pluginrpc;

option go_package = "github.com/FlameInTheDark/emerald/pkg/pluginrpc;pluginrpc";

service EmeraldPlugin {
  rpc Describe(DescribeRequest) returns (DescribeResponse);
  rpc ValidateConfig(ValidateConfigRequest) returns (ValidateConfigResponse);
  rpc ExecuteAction(ExecuteActionRequest) returns (ExecuteActionResponse);
  rpc ToolDefinition(ToolDefinitionRequest) returns (ToolDefinitionResponse);
  rpc ExecuteTool(ExecuteToolRequest) returns (ExecuteToolResponse);
}

message DescribeRequest {}

message DescribeResponse {
  bytes plugin_info_json = 1;
}

message ValidateConfigRequest {
  string node_id = 1;
  bytes config_json = 2;
}

message ValidateConfigResponse {}

message ExecuteActionRequest {
  string node_id = 1;
  bytes config_json = 2;
  bytes input_json = 3;
}

message ExecuteActionResponse {
  bytes output_json = 1;
}

message ToolDefinitionRequest {
  string node_id = 1;
  bytes meta_json = 2;
  bytes config_json = 3;
}

message ToolDefinitionResponse {
  bytes definition_json = 1;
}

message ExecuteToolRequest {
  string node_id = 1;
  bytes config_json = 2;
  bytes args_json = 3;
  bytes input_json = 4;
}

message ExecuteToolResponse {
  bytes result_json = 1;
}
