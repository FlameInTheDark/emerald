name: Release Build

on:
  release:
    types:
      - published
  repository_dispatch:
    types:
      - semantic-release-published
  workflow_dispatch:
    inputs:
      tag_name:
        description: Release tag to build, for example v1.2.3
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    name: Resolve release tag
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}

    steps:
      - name: Resolve release context
        id: resolve
        shell: bash
        run: |
          TAG_NAME=""
          PRERELEASE="false"

          if [ "${{ github.event_name }}" = "release" ]; then
            TAG_NAME="${{ github.event.release.tag_name }}"
            PRERELEASE="${{ github.event.release.prerelease }}"
          elif [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            TAG_NAME="${{ github.event.client_payload.tag_name }}"
            PRERELEASE="${{ github.event.client_payload.prerelease }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG_NAME="${{ inputs.tag_name }}"
          fi

          if [ -z "$TAG_NAME" ]; then
            echo "Release tag could not be determined." >&2
            exit 1
          fi

          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  frontend:
    name: Build frontend artifact
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Build frontend
        run: npm --prefix web run build

      - name: Upload embedded frontend
        uses: actions/upload-artifact@v4
        with:
          name: embedded-frontend
          path: internal/api/web/dist
          if-no-files-found: error

  binaries:
    name: Build ${{ matrix.name }}
    needs:
      - prepare
      - frontend
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            binary_name: automator
            archive_suffix: linux_amd64.tar.gz
          - name: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            binary_name: automator.exe
            archive_suffix: windows_amd64.zip
          - name: macos-amd64
            runner: macos-13
            goos: darwin
            goarch: amd64
            binary_name: automator
            archive_suffix: darwin_amd64.tar.gz
          - name: macos-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            binary_name: automator
            archive_suffix: darwin_arm64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup MinGW for Windows CGO
        if: matrix.goos == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          update: true
          install: mingw-w64-x86_64-gcc

      - name: Download embedded frontend
        uses: actions/download-artifact@v4
        with:
          name: embedded-frontend
          path: internal/api/web/dist

      - name: Create dist directory on Unix
        if: matrix.goos != 'windows'
        run: mkdir -p dist

      - name: Create dist directory on Windows
        if: matrix.goos == 'windows'
        shell: pwsh
        run: New-Item -ItemType Directory -Force dist | Out-Null

      - name: Build binary
        env:
          CGO_ENABLED: 1
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.goos == 'windows' && 'gcc' || '' }}
        run: go build -ldflags="-s -w" -o dist/${{ matrix.binary_name }} ./cmd/server

      - name: Package Unix archive
        if: matrix.goos != 'windows'
        run: tar -C dist -czf dist/automator_${{ needs.prepare.outputs.tag_name }}_${{ matrix.archive_suffix }} ${{ matrix.binary_name }}

      - name: Package Windows archive
        if: matrix.goos == 'windows'
        shell: pwsh
        run: Compress-Archive -Path dist/${{ matrix.binary_name }} -DestinationPath dist/automator_${{ needs.prepare.outputs.tag_name }}_${{ matrix.archive_suffix }}

      - name: Upload packaged binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}-archive
          path: dist/automator_${{ needs.prepare.outputs.tag_name }}_${{ matrix.archive_suffix }}
          if-no-files-found: error

  container:
    name: Build and push container
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.tag_name }}
            type=raw,value=latest,enable=${{ needs.prepare.outputs.prerelease != 'true' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-assets:
    name: Upload release assets
    needs:
      - prepare
      - binaries
      - container
    runs-on: ubuntu-latest

    steps:
      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: "*-archive"
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > SHA256SUMS.txt

      - name: Upload assets to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          files: |
            release-assets/*
          overwrite_files: true
